name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  newman:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Start API (background)
        run: |
          nohup dotnet run --no-launch-profile --project SeatHold.Api --urls http://127.0.0.1:5080 > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API
        run: |
          echo "Waiting for API on http://127.0.0.1:5080 ..."
          for i in {1..60}; do
            if curl -fsS --retry 0 http://127.0.0.1:5080/swagger/index.html > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Not ready yet ($i)..."
            ss -ltnp | head -n 50 || true
            sleep 0.5
          done
          echo "API did not become ready"
          echo "---- api.log ----"
          cat api.log || true
          exit 1

      - name: Run Newman (export env)
        run: |
          newman run postman/SeatHoldApi.postman_collection.json \
            -e postman/SeatHoldApi.local.postman_environment.json \
            --export-environment postman/SeatHoldApi.local.exported.postman_environment.json \
            --reporters cli

      - name: Write summary
        if: always()
        run: |
          echo "## Newman API Contract Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Base URL: http://127.0.0.1:5080" >> $GITHUB_STEP_SUMMARY
          if [ -f postman/SeatHoldApi.local.exported.postman_environment.json ]; then
            SEAT_ID=$(node -e "const e=require('./postman/SeatHoldApi.local.exported.postman_environment.json'); console.log((e.values.find(v=>v.key==='seatId')||{}).value||'');")
            HOLD_ID=$(node -e "const e=require('./postman/SeatHoldApi.local.exported.postman_environment.json'); console.log((e.values.find(v=>v.key==='holdId')||{}).value||'');")
            echo "- seatId: \`$SEAT_ID\`" >> $GITHUB_STEP_SUMMARY
            echo "- holdId: \`$HOLD_ID\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- (No exported environment found)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "API logs (first 80 lines):" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          head -n 80 api.log >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Stop API
        if: always()
        run: |
          kill $(cat api.pid) || true
          echo "---- api.log ----"
          cat api.log || true
